server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    location / {
        proxy_pass http://backend:8000;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
