services:
  db:
    image: postgres:17-alpine
    env_file:
      - ./.env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${POSTGRES_BIND_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    command: >
      postgres -c max_connections=1000
               -c shared_buffers=256MB
               -c effective_cache_size=768MB
               -c maintenance_work_mem=64MB
               -c checkpoint_completion_target=0.7
               -c wal_buffers=16MB
               -c default_statistics_target=100
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_BIND_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../src
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL:-admin@example.com}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-Admin123!}
      FIRST_SUPERUSER_USERNAME: ${FIRST_SUPERUSER_USERNAME:-admin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_BIND_PORT:-8000}:8000"
    volumes:
      - ../src:/app/src
    command: >
      sh -c "alembic -c src/alembic.ini upgrade head &&
             python -c 'import asyncio; from src.core.init_db import create_superuser; asyncio.run(create_superuser())' &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    container_name: celery_worker
    build:
      context: ../src
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src
    command: >
      celery -A src.tasks.celery_app.celery_app worker --loglevel=info

  flower:
    container_name: flower
    build:
      context: ../src
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      FLOWER_USER: ${FLOWER_USER:-flower_admin}
      FLOWER_PASSWORD: ${FLOWER_PASSWORD:-change_me}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FLOWER_BIND_PORT:-5555}:5555"
    command: >
      celery -A src.tasks.celery_app.celery_app flower --port=5555
      --basic-auth=${FLOWER_USER:-flower_admin}:${FLOWER_PASSWORD:-change_me}

  portainer:
    image: portainer/portainer-ce:latest
    profiles: ["ops"]
    ports:
      - "127.0.0.1:${PORTAINER_HTTP_PORT:-9000}:9000"
      - "127.0.0.1:${PORTAINER_HTTPS_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  postgres_data:
  redis_data:
  portainer_data:
